<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戰力評估室 - 完美復刻版</title>
    <style>
        :root {
            --bg-color: #e0f2fe;
            --pixel-black: #2d2d2d;
            --pixel-white: #ffffff;
            --pixel-blue: #7dd3fc;
            --pixel-yellow: #fde68a;
            --pixel-pink: #fbcfe8;
            --pixel-purple: #c084fc;
            --pixel-red: #ef4444;
            --shadow: 5px 5px 0px var(--pixel-black);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--pixel-blue) 1px, transparent 1px);
            background-size: 24px 24px;
            font-family: 'PingFang TC', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .main-wrapper { display: flex; gap: 25px; max-width: 1100px; width: 100%; flex-wrap: wrap; justify-content: center; }

        .pixel-box {
            background: var(--pixel-white); border: 4px solid var(--pixel-black);
            padding: 24px; box-shadow: var(--shadow);
            flex: 1; min-width: 360px; max-width: 500px; border-radius: 4px; margin-bottom: 20px;
        }

        h2 { text-align: center; background: var(--pixel-black); color: var(--pixel-white); margin: -24px -24px 20px -20px; padding: 12px; font-size: 1.2em; }

        .label-tag {
            display: inline-block; background: var(--pixel-blue); border: 3px solid var(--pixel-black);
            padding: 4px 12px; font-weight: bold; margin-bottom: 10px; box-shadow: 3px 3px 0px var(--pixel-black);
        }
        .purple-tag { background: var(--pixel-purple); color: white; }

        .input-group { background: #f3f4f6; border: 3px solid var(--pixel-black); padding: 15px; margin-bottom: 20px; }
        input { border: 3px solid var(--pixel-black); padding: 10px; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }

        /* 支付方式切換 */
        .method-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .method-btn {
            flex: 1; padding: 10px; border: 3px solid var(--pixel-black); cursor: pointer;
            background: white; text-align: center; font-weight: bold; box-shadow: 3px 3px 0px var(--pixel-black);
        }
        .method-btn.active { background: var(--pixel-black); color: white; box-shadow: none; transform: translate(2px, 2px); }

        .btn-action { padding: 12px; border: 3px solid var(--pixel-black); font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px var(--pixel-black); display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-blue { background: var(--pixel-blue); flex: 1; }
        .btn-yellow { background: #fbbf24; flex: 1; }
        .btn-archive { width: 100%; background: var(--pixel-pink); margin-top: 15px; }

        /* 任務清單樣式 */
        .list-section { margin-bottom: 20px; }
        .list-title { font-weight: bold; border-bottom: 3px solid var(--pixel-black); padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .task-item { border-bottom: 2px solid var(--pixel-black); padding: 10px 0; display: flex; align-items: center; gap: 12px; }
        .task-img { width: 50px; height: 50px; border: 2px solid #000; object-fit: cover; background: #eee; image-rendering: pixelated; }
        .task-info { flex: 1; }
        .task-meta { display: flex; justify-content: space-between; font-weight: bold; }
        .task-tools { display: flex; gap: 5px; margin-top: 5px; }
        .tool-btn { font-size: 12px; padding: 2px 8px; border: 2px solid var(--pixel-black); cursor: pointer; background: white; font-weight: bold; }
        .btn-del { background: var(--pixel-red); color: white; }

        /* 統計面板 */
        .total-panel { background: #fef08a; border: 3px solid var(--pixel-black); padding: 15px; }
        .remaining-box { border: 4px solid var(--pixel-black); background: #fde68a; padding: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 1.4em; font-weight: 900; box-shadow: 4px 4px 0px var(--pixel-black); }

        /* 歷史紀錄卡片 */
        .history-section { margin-top: 30px; }
        .history-card { border: 3px solid var(--pixel-black); background: white; padding: 15px; margin-bottom: 15px; box-shadow: 4px 4px 0px var(--pixel-black); }
        .history-card h4 { margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .history-tools { display: flex; gap: 10px; margin-top: 12px; }

        /* 彈窗 */
        #detail-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="pixel-box">
        <h2>[ 🚀 戰力評估室 🚀 ]</h2>
        <div class="label-tag">01. 本月初始戰力</div>
        <div style="display:flex; gap:10px;">
            <input type="month" id="month-input">
            <input type="number" id="income-input" placeholder="28000">
        </div>

        <div class="input-group">
            <div class="label-tag purple-tag">02. 偵測能量消耗</div>
            <input type="text" id="name-input" placeholder="這次消耗嗒什麼寶物...">
            <input type="number" id="amount-input" placeholder="金額 (G)">
            
            <div class="method-selector">
                <div class="method-btn active" id="m-cash" onclick="setMethod('現金')">💵 現金</div>
                <div class="method-btn" id="m-card" onclick="setMethod('信用卡')">💳 信用卡</div>
            </div>

            <div style="font-size: 13px; margin-bottom: 10px;">📸 捕捉戰利品照片 (可不傳)：<br><input type="file" id="file-input" accept="image/*"></div>

            <div style="display:flex; gap:10px;">
                <button class="btn-action btn-blue" onclick="addItem('fixed')">🏠 主線生存支出</button>
                <button class="btn-action btn-yellow" onclick="addItem('extra')">🎁 支線快樂消耗</button>
            </div>
        </div>
        <button class="btn-action btn-archive" onclick="archiveData()">💾 任務完成，封印帳本</button>
    </div>

    <div class="pixel-box">
        <h2>[ 📜 任務清單 ]</h2>
        
        <div class="list-section">
            <div class="list-title" style="color: #2563eb;"><span>🏠 主線任務</span><span id="sub-fixed">$0</span></div>
            <div id="fixed-items"></div>
        </div>

        <div class="list-section">
            <div class="list-title" style="color: #d97706;"><span>🎁 支線任務</span><span id="sub-extra">$0</span></div>
            <div id="extra-items"></div>
        </div>

        <div class="total-panel">
            <div style="display:flex; justify-content:space-between; font-size:14px;"><span>現金支付小計</span><span id="stat-cash">$0</span></div>
            <div style="display:flex; justify-content:space-between; font-size:14px;"><span>信用卡帳單小計</span><span id="stat-card">$0</span></div>
            <div style="display:flex; justify-content:space-between; font-weight:bold; margin-top:5px; border-top:1px solid #000; padding-top:5px;"><span>總能量消耗</span><span id="stat-total">$0</span></div>
            
            <div class="remaining-box">
                <span style="color:#1d4ed8">剩餘戰力：</span>
                <span id="stat-remain">$0</span>
            </div>
        </div>

        <div class="history-section">
            <div class="list-title"><span>📜 歷史通關紀錄</span></div>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<div id="detail-modal" onclick="this.style.display='none'">
    <div class="pixel-box" style="max-height:80vh; overflow-y:auto;" onclick="event.stopPropagation()">
        <h2 id="modal-title">詳情</h2>
        <div id="modal-content"></div>
        <button class="btn-action btn-blue" style="width:100%; margin-top:15px;" onclick="document.getElementById('detail-modal').style.display='none'">關閉</button>
    </div>
</div>

<canvas id="compCanvas" style="display:none;"></canvas>

<script>
    let state = { expenses: { fixed: [], extra: [] }, method: '現金' };
    let history = JSON.parse(localStorage.getItem('pixel_history')) || [];

    function setMethod(m) {
        state.method = m;
        document.getElementById('m-cash').className = m === '現金' ? 'method-btn active' : 'method-btn';
        document.getElementById('m-card').className = m === '信用卡' ? 'method-btn active' : 'method-btn';
    }

    function addItem(type) {
        const n = document.getElementById('name-input'), a = document.getElementById('amount-input'), f = document.getElementById('file-input');
        if(!n.value || !a.value) return;

        const pushData = (img) => {
            state.expenses[type].push({ name: n.value, amount: parseFloat(a.value), method: state.method, img });
            n.value = ''; a.value = ''; f.value = '';
            render();
        };

        if(f.files[0]) {
            const reader = new FileReader();
            reader.readAsDataURL(f.files[0]);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cvs = document.getElementById('compCanvas');
                    const ctx = cvs.getContext('2d');
                    cvs.width = 100; cvs.height = 100;
                    ctx.drawImage(img, 0, 0, 100, 100);
                    pushData(cvs.toDataURL('image/jpeg', 0.5));
                };
            };
        } else { pushData(null); }
    }

    function render() {
        const income = parseFloat(document.getElementById('income-input').value) || 0;
        let totals = { fixed: 0, extra: 0, cash: 0, card: 0 };

        const makeHtml = (type) => {
            const container = document.getElementById(`${type}-items`);
            container.innerHTML = '';
            state.expenses[type].forEach((item, i) => {
                totals[type] += item.amount;
                if(item.method === '現金') totals.cash += item.amount; else totals.card += item.amount;
                
                container.innerHTML += `
                    <div class="task-item">
                        ${item.img ? `<img src="${item.img}" class="task-img">` : ''}
                        <div class="task-info">
                            <div class="task-meta"><span>${item.name}</span><span>$${item.amount.toLocaleString()}</span></div>
                            <div style="font-size:12px; background:#eee; display:inline-block; padding:0 4px; border:1px solid #000;">${item.method === '現金' ? '💵 現金' : '💳 信用卡'}</div>
                            <div class="task-tools">
                                <span class="tool-btn" onclick="editItem('${type}', ${i})">修正</span>
                                <span class="tool-btn btn-del" onclick="deleteItem('${type}', ${i})">刪除</span>
                            </div>
                        </div>
                    </div>`;
            });
        };

        makeHtml('fixed'); makeHtml('extra');
        document.getElementById('sub-fixed').innerText = '$' + totals.fixed.toLocaleString();
        document.getElementById('sub-extra').innerText = '$' + totals.extra.toLocaleString();
        document.getElementById('stat-cash').innerText = '$' + totals.cash.toLocaleString();
        document.getElementById('stat-card').innerText = '$' + totals.card.toLocaleString();
        const totalExp = totals.fixed + totals.extra;
        document.getElementById('stat-total').innerText = '$' + totalExp.toLocaleString();
        document.getElementById('stat-remain').innerText = '$' + (income - totalExp).toLocaleString();
    }

    function deleteItem(type, i) { state.expenses[type].splice(i, 1); render(); }
    function editItem(type, i) {
        const item = state.expenses[type][i];
        document.getElementById('name-input').value = item.name;
        document.getElementById('amount-input').value = item.amount;
        setMethod(item.method);
        deleteItem(type, i);
    }

    function archiveData() {
        const month = document.getElementById('month-input').value;
        const income = parseFloat(document.getElementById('income-input').value) || 0;
        const total = state.expenses.fixed.concat(state.expenses.extra).reduce((s,i)=>s+i.amount, 0);
        if(!month || total === 0) return alert("請填寫月份及支出");

        history.unshift({ month, income, total, details: JSON.parse(JSON.stringify(state.expenses)) });
        localStorage.setItem('pixel_history', JSON.stringify(history));
        state.expenses = { fixed: [], extra: [] };
        render(); renderHistory();
    }

    function renderHistory() {
        const hList = document.getElementById('history-list');
        hList.innerHTML = history.map((h, i) => `
            <div class="history-card">
                <h4>📅 ${h.month} 戰報</h4>
                戰力: $${h.income.toLocaleString()} | 消耗: $${h.total.toLocaleString()}<br>
                結算: <span style="color:#16a34a; font-weight:bold;">$${(h.income - h.total).toLocaleString()}</span>
                <div class="history-tools">
                    <button class="tool-btn" onclick="showDetail(${i})">🔍 查看詳情</button>
                    <button class="tool-btn btn-del" onclick="deleteHistory(${i})">🗑️ 刪除</button>
                </div>
            </div>
        `).join('') || '尚未有通關紀錄';
    }

    function showDetail(i) {
        const h = history[i];
        document.getElementById('modal-title').innerText = `${h.month} 消耗詳情`;
        let html = '';
        const all = h.details.fixed.concat(h.details.extra);
        all.forEach(item => {
            html += `<div style="display:flex; justify-content:space-between; border-bottom:1px dashed #000; padding:5px 0;">
                <span>${item.name} (${item.method})</span><span>$${item.amount.toLocaleString()}</span>
            </div>`;
        });
        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function deleteHistory(i) { history.splice(i, 1); localStorage.setItem('pixel_history', JSON.stringify(history)); renderHistory(); }

    window.onload = () => {
        const now = new Date();
        document.getElementById('month-input').value = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, '0');
        renderHistory();
    };
</script>
</body>
</html>
