<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戰力評估室 - 終極全功能版</title>
    <style>
        :root {
            --bg-color: #e0f2fe;
            --pixel-black: #2d2d2d;
            --pixel-white: #ffffff;
            --pixel-blue: #7dd3fc;
            --pixel-yellow: #fffce1;
            --pixel-pink: #fbcfe8;
            --pixel-purple: #c084fc;
            --pixel-gray: #f3f4f6;
            --shadow: 5px 5px 0px var(--pixel-black);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--pixel-blue) 1px, transparent 1px);
            background-size: 24px 24px;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .main-wrapper { display: flex; gap: 25px; max-width: 1100px; width: 100%; flex-wrap: wrap; justify-content: center; }

        .pixel-box {
            background: var(--pixel-white); border: 4px solid var(--pixel-black);
            padding: 24px; box-shadow: var(--shadow);
            flex: 1; min-width: 340px; max-width: 450px; border-radius: 4px; margin-bottom: 20px;
        }

        h2 { text-align: center; background: var(--pixel-black); color: var(--pixel-white); margin: -24px -24px 20px -20px; padding: 12px; font-size: 1.2em; }

        .label-tag {
            display: inline-block; background: var(--pixel-blue); border: 3px solid var(--pixel-black);
            padding: 4px 12px; font-weight: bold; margin-bottom: 10px; box-shadow: 3px 3px 0px var(--pixel-black);
        }

        .purple-tag { background: var(--pixel-purple); color: white; }

        .input-group { background: var(--pixel-gray); border: 3px solid var(--pixel-black); padding: 15px; margin-bottom: 20px; }

        input { border: 3px solid var(--pixel-black); padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px; }

        .method-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .method-btn {
            flex: 1; padding: 8px; border: 3px solid var(--pixel-black); cursor: pointer;
            background: white; text-align: center; font-weight: bold; box-shadow: 3px 3px 0px var(--pixel-black);
        }
        .method-btn.active { background: var(--pixel-black); color: white; box-shadow: none; transform: translate(2px, 2px); }

        .btn-action { flex: 1; padding: 12px; border: 3px solid var(--pixel-black); font-weight: bold; cursor: pointer; box-shadow: 4px 4px 0px var(--pixel-black); }
        .btn-blue { background: var(--pixel-blue); }
        .btn-yellow { background: #fbbf24; }
        .btn-archive { width: 100%; background: var(--pixel-pink); margin-top: 10px; }
        .btn-action:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--pixel-black); }

        .summary-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 2px dashed #ccc; gap: 12px; }
        .item-img { width: 50px; height: 50px; border: 2px solid #000; object-fit: cover; background: #fff; image-rendering: pixelated; }
        
        .btn-tool { font-size: 10px; cursor: pointer; border: 1px solid #666; padding: 2px 4px; margin-left: 5px; background: white; }
        .btn-del { color: #ff4444; border-color: #ff4444; }

        .total-panel { background: var(--pixel-yellow); border: 3px solid #000; padding: 15px; margin-top: 15px; }
        .stat-line { display: flex; justify-content: space-between; font-size: 0.85em; color: #444; margin-bottom: 3px; }

        .history-card { border: 2px solid var(--pixel-black); background: #fff; padding: 10px; margin-bottom: 10px; font-size: 0.85em; }
        .tag { font-size: 10px; padding: 2px 4px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="pixel-box">
        <h2>[ 🚀 戰力評估室 🚀 ]</h2>
        <div class="label-tag">01. 本月初始戰力</div>
        <div style="display:flex; gap:10px;">
            <input type="month" id="month-select" style="flex:1.2">
            <input type="number" id="income" placeholder="輸入戰力值" style="flex:1" oninput="saveCurrentState()">
        </div>

        <div class="input-group">
            <div class="label-tag purple-tag">02. 偵測能量消耗</div>
            <input type="text" id="item-name" placeholder="這次消耗嗒什麼寶物...">
            <input type="number" id="item-amount" placeholder="金額 (G)">
            <div class="method-selector">
                <div class="method-btn active" id="m-cash" onclick="setMethod('現金')">💵 現金</div>
                <div class="method-btn" id="m-card" onclick="setMethod('信用卡')">💳 信用卡</div>
            </div>
            <div style="margin-bottom: 10px; font-size: 0.8em;">📸 戰利品照片 (自動壓縮)：<input type="file" id="item-file" accept="image/*"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn-action btn-blue" onclick="processAndTransfer('fixed')">🏠 主線支出</button>
                <button class="btn-action btn-yellow" onclick="processAndTransfer('extra')">🎁 支線消耗</button>
            </div>
        </div>
        <button class="btn-action btn-archive" onclick="archiveMonth()">💾 任務完成，封印帳本</button>
    </div>

    <div class="pixel-box">
        <h2>[ 📜 任務清單 ]</h2>
        <div style="font-weight: bold;">🛡️ 已完成主線</div>
        <div id="list-fixed"></div>
        <div style="font-weight: bold; margin-top:20px;">✨ 已解鎖支線</div>
        <div id="list-extra"></div>
        
        <div class="total-panel">
            <div class="stat-line"><span>💵 現金支付：</span><span id="stat-cash">0 G</span></div>
            <div class="stat-line"><span>💳 信用卡帳單：</span><span id="stat-card">0 G</span></div>
            <div style="display:flex; justify-content:space-between; border-top:1px solid #000; padding-top:5px; margin-top:5px;"><span>總能量消耗：</span><span id="total-expense">0 G</span></div>
            <div style="display:flex; justify-content:space-between; font-weight:900; color:#1d4ed8; font-size:1.2em;"><span>剩餘戰力：</span><span id="remaining">0 G</span></div>
        </div>

        <h3 style="border-bottom: 4px solid #000; margin-top:25px; font-size:1em;">📜 歷史月度對比</h3>
        <div id="history-log"></div>
    </div>
</div>

<canvas id="compressCanvas" style="display:none;"></canvas>

<script>
    let currentExpenses = { fixed: [], extra: [] };
    let currentMethod = '現金';
    let historyData = JSON.parse(localStorage.getItem('pixelBudgetHistory')) || [];

    // 初始化與讀取暫存
    window.onload = () => {
        const now = new Date();
        document.getElementById('month-select').value = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, '0');
        const saved = JSON.parse(localStorage.getItem('pixelCurrentDraft'));
        if(saved) {
            currentExpenses = saved.expenses;
            document.getElementById('income').value = saved.income;
        }
        renderCurrent();
        renderHistory();
    };

    function setMethod(m) {
        currentMethod = m;
        document.getElementById('m-cash').className = m === '現金' ? 'method-btn active' : 'method-btn';
        document.getElementById('m-card').className = m === '信用卡' ? 'method-btn active' : 'method-btn';
    }

    function processAndTransfer(type) {
        const nI = document.getElementById('item-name'), aI = document.getElementById('item-amount'), fI = document.getElementById('item-file');
        const name = nI.value.trim(), amount = parseFloat(aI.value) || 0;
        if (!name || amount <= 0) return alert("請輸入正確資料！");

        const save = (img) => {
            currentExpenses[type].push({ name, amount, img, method: currentMethod });
            nI.value = ""; aI.value = ""; fI.value = "";
            saveCurrentState();
            renderCurrent();
        };

        if (fI.files[0]) {
            const reader = new FileReader();
            reader.readAsDataURL(fI.files[0]);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.getElementById('compressCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 100; canvas.height = 100;
                    ctx.drawImage(img, 0, 0, 100, 100);
                    save(canvas.toDataURL('image/jpeg', 0.5));
                };
            };
        } else { save(null); }
    }

    function saveCurrentState() {
        const income = document.getElementById('income').value;
        localStorage.setItem('pixelCurrentDraft', JSON.stringify({ expenses: currentExpenses, income }));
        renderCurrent();
    }

    function renderCurrent() {
        const fL = document.getElementById('list-fixed'), eL = document.getElementById('list-extra');
        fL.innerHTML = ""; eL.innerHTML = "";
        let total = 0, cash = 0, card = 0;

        const draw = (type, list) => {
            currentExpenses[type].forEach((item, index) => {
                total += item.amount;
                if(item.method === '現金') cash += item.amount; else card += item.amount;
                const imgTag = item.img ? `<img src="${item.img}" class="item-img">` : "";
                list.innerHTML += `
                    <div class="summary-item">
                        ${imgTag}
                        <div style="flex:1">
                            <div style="display:flex;justify-content:space-between"><b>${item.name}</b><span>${item.amount} G</span></div>
                            <div style="font-size:10px; color:#666">${item.method} 
                                <span class="btn-tool" onclick="editItem('${type}', ${index})">✎ 編輯</span>
                                <span class="btn-tool btn-del" onclick="deleteItem('${type}', ${index})">❌ 刪除</span>
                            </div>
                        </div>
                    </div>`;
            });
        };
        draw('fixed', fL); draw('extra', eL);
        const income = parseFloat(document.getElementById('income').value) || 0;
        document.getElementById('stat-cash').innerText = cash + " G";
        document.getElementById('stat-card').innerText = card + " G";
        document.getElementById('total-expense').innerText = total + " G";
        document.getElementById('remaining').innerText = (income - total) + " G";
        return { total, income };
    }

    function deleteItem(type, index) { currentExpenses[type].splice(index, 1); saveCurrentState(); }
    function editItem(type, index) {
        const item = currentExpenses[type][index];
        document.getElementById('item-name').value = item.name;
        document.getElementById('item-amount').value = item.amount;
        setMethod(item.method);
        deleteItem(type, index);
    }

    function archiveMonth() {
        const { total, income } = renderCurrent();
        const month = document.getElementById('month-select').value;
        if(total === 0) return alert("沒有資料可以存檔喔！");
        
        let compare = "";
        if(historyData.length > 0) {
            const diff = total - historyData[0].total;
            compare = diff > 0 ? `<span class="tag" style="background:#fee2e2;color:#ef4444;">▲ ${diff}</span>` : `<span class="tag" style="background:#dcfce7;color:#10b981;">▼ ${Math.abs(diff)}</span>`;
        }

        historyData.unshift({ month, total, income, compare });
        localStorage.setItem('pixelBudgetHistory', JSON.stringify(historyData));
        currentExpenses = { fixed: [], extra: [] };
        saveCurrentState();
        renderHistory();
        alert("存檔成功！");
    }

    function renderHistory() {
        document.getElementById('history-log').innerHTML = historyData.map(r => `
            <div class="history-card">
                <div style="display:flex;justify-content:space-between"><b>📅 ${r.month}</b> ${r.compare || ""}</div>
                支出: ${r.total} G / 餘額: ${r.income - r.total} G
            </div>
        `).join('') || "尚無歷史紀錄";
    }
</script>
</body>
</html>
