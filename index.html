<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> 👛錢包的生存報告 </title>
    <style>
        :root {
            --bg-color: #e0f2fe;
            --pixel-black: #2d2d2d;
            --pixel-white: #ffffff;
            --pixel-blue: #7dd3fc;
            --pixel-yellow: #fde047;
            --pixel-pink: #fbcfe8;
            --pixel-gray: #f3f4f6;
            --pixel-purple: #c084fc;
            --pixel-red: #ff4757;
            --shadow: 4px 4px 0px var(--pixel-black);
        }

        * {
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--pixel-blue) 1.2px, transparent 1.2px);
            background-size: 20px 20px;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            margin: 0; 
            padding: 10px; /* 手機版邊距縮小 */
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            color: var(--pixel-black);
        }

        .main-wrapper { 
            display: flex; 
            flex-direction: column; /* 預設手機版上下堆疊 */
            gap: 20px; 
            width: 100%; 
            max-width: 500px; /* 手機版限制最大寬度 */
        }

        /* 電腦或平板版才並排 */
        @media (min-width: 850px) {
            .main-wrapper {
                flex-direction: row;
                max-width: 1000px;
                align-items: flex-start;
            }
            .pixel-box { flex: 1; }
        }

        .pixel-box {
            background: var(--pixel-white);
            border: 3px solid var(--pixel-black);
            padding: 15px; /* 縮小內距讓內容呼吸 */
            box-shadow: var(--shadow);
            border-radius: 4px;
            width: 100%;
        }

        h2 { 
            text-align: center; background: var(--pixel-black); color: var(--pixel-white); 
            margin: -15px -15px 15px -15px; padding: 12px; font-size: 1.2em; 
            letter-spacing: 1px; border-bottom: 3px solid var(--pixel-black);
        }

        .section-label { 
            display: inline-block; margin: 10px 0 8px; font-weight: 900; 
            background: var(--pixel-blue); padding: 2px 10px; border: 2px solid var(--pixel-black);
            box-shadow: 2px 2px 0px var(--pixel-black); font-size: 0.9em;
        }

        .input-group { 
            background: var(--pixel-gray); 
            border: 3px solid var(--pixel-black); 
            padding: 15px; 
            margin-top: 20px; 
            position: relative; 
        }

        input { 
            border: 3px solid var(--pixel-black); 
            padding: 10px; 
            font-size: 16px; /* 防止 iOS 自動放大 */
            width: 100%; 
            margin-bottom: 10px; 
            background: #fff;
        }

        .method-selector { display: flex; gap: 8px; margin-bottom: 12px; }
        .method-btn { 
            flex: 1; padding: 8px; border: 2px solid var(--pixel-black); 
            cursor: pointer; background: white; font-size: 0.85em; text-align: center; 
            font-weight: bold; box-shadow: 3px 3px 0px var(--pixel-black);
        }
        .method-btn.active { background: var(--pixel-black); color: white; transform: translate(1px, 1px); box-shadow: 1px 1px 0px var(--pixel-black); }

        .btn-row { display: flex; gap: 8px; }
        button { 
            padding: 10px 5px; border: 3px solid var(--pixel-black); font-weight: 900; 
            cursor: pointer; box-shadow: 3px 3px 0px var(--pixel-black); font-family: inherit;
            font-size: 0.9em;
        }

        .btn-blue { background: var(--pixel-blue); flex: 1; }
        .btn-yellow { background: var(--pixel-yellow); flex: 1; }
        .btn-archive { width: 100%; background: var(--pixel-pink); margin-top: 15px; }

        /* 清單樣式優化 */
        .summary-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 2px solid var(--pixel-black); gap: 10px; }
        .item-img { width: 50px; height: 50px; border: 2px solid var(--pixel-black); flex-shrink: 0; }
        .item-info { display: flex; justify-content: space-between; font-weight: bold; width: 100%; }

        .total-panel { margin-top: 15px; padding: 15px; background: var(--pixel-yellow); border: 3px solid var(--pixel-black); box-shadow: 4px 4px 0px var(--pixel-black); }
        .stat-sub { font-size: 0.85em; display: flex; justify-content: space-between; margin-bottom: 4px; font-weight: bold;}
        
        #remaining-box { font-size: 1.2em; font-weight: 900; margin-top: 8px; border-top: 2px solid #000; padding-top: 8px; }

        .mission-title { font-size: 1.1em; font-weight: 900; margin: 15px 0 5px; display: flex; justify-content: space-between; border-bottom: 3px solid var(--pixel-black); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="pixel-box">
        <h2>[ 🚀 戰力評估室 ]</h2>
        <span class="section-label">01. 本月初始戰力</span>
        <div style="display:flex; gap:8px;">
            <input type="month" id="month-select" style="flex: 1.3;">
            <input type="number" id="income" placeholder="戰力值" style="flex: 1;">
        </div>

        <div class="input-group">
            <span class="section-label" style="position:absolute; top:-15px; left:10px; background: var(--pixel-purple); color: white; margin:0;">02. 偵測能量消耗</span>
            <input type="text" id="item-name" placeholder="消耗了什麼寶物...">
            <input type="number" id="item-amount" placeholder="金額 (G)">
            <div class="method-selector">
                <div class="method-btn active" id="m-cash" onclick="setMethod('現金')">💵 現金</div>
                <div class="method-btn" id="m-card" onclick="setMethod('信用卡')">💳 信用卡</div>
            </div>
            <div class="btn-row">
                <button class="btn-blue" onclick="processAndTransfer('fixed')">🏠 主線支出</button>
                <button class="btn-yellow" onclick="processAndTransfer('extra')">🎁 支線消耗</button>
            </div>
        </div>
        <button class="btn-archive" onclick="archiveMonth()">💾 任務完成，封印帳本 </button>
    </div>

    <div class="pixel-box">
        <h2>[ 📜 任務清單 ]</h2>
        <div class="mission-title" style="color: #1d4ed8;">🏠 主線任務 <span id="sub-f">$0</span></div>
        <div id="list-fixed"></div>
        
        <div class="mission-title" style="color: #b45309;">🎁 支線任務 <span id="sub-e">$0</span></div>
        <div id="list-extra"></div>

        <div class="total-panel">
            <div class="stat-sub"><span>現金小計</span><span id="stat-cash">$0</span></div>
            <div class="stat-sub"><span>信用卡小計</span><span id="stat-card">$0</span></div>
            <div id="remaining-box">
                <span>剩餘戰力：</span><span id="remaining">$0</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ... (保持原本的 JavaScript 邏輯不變) ...
</script>

</body>
</html>
