<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 👛錢包的生存報告 </title>
    <link rel="icon" href="https://img.onl/T5Fm2o" type="image/png">
    <style>
        :root {
            --bg-color: #e0f2fe;
            --pixel-black: #2d2d2d;
            --pixel-white: #ffffff;
            --pixel-blue: #7dd3fc;
            --pixel-yellow: #fde047;
            --pixel-pink: #fbcfe8;
            --pixel-gray: #f3f4f6;
            --pixel-purple: #c084fc;
            --pixel-red: #ff4757;
            --shadow: 6px 6px 0px var(--pixel-black);{
        -webkit-tap-highlight-color: transparent; /* 移除手機點擊時的藍色高亮 */
    }

    input, button {
        -webkit-appearance: none;  /* 移除 iOS 內建的按鈕陰影和外觀 */
        border-radius: 0;          /* 移除 iOS 強制加上的圓角 */
        opacity: 1;                /* 防止字體顏色變淡 */
        color: #2d2d2d !important; /* 強制文字顯示為你的深灰色 */
        -webkit-text-fill-color: #2d2d2d; /* 確保 iOS 文字填色正確 */
    }

    /* 針對日期選擇器的特別修正 */
    input[type="month"] {
        color: #2d2d2d !important;
        background-color: #ffffff;
    }
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--pixel-blue) 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            color: var(--pixel-black);
        }

        .main-wrapper { display: flex; gap: 30px; max-width: 1100px; width: 100%; flex-wrap: wrap; align-items: flex-start; }

        .pixel-box {
            background: var(--pixel-white);
            border: 4px solid var(--pixel-black);
            padding: 24px;
            box-shadow: var(--shadow);
            flex: 1; min-width: 340px;
            border-radius: 4px;
            position: relative;
        }

        h2 { 
            text-align: center; background: var(--pixel-black); color: var(--pixel-white); 
            margin: -24px -24px 20px -24px; padding: 15px; font-size: 1.4em; 
            letter-spacing: 2px; border-bottom: 4px solid var(--pixel-black);
        }

        .section-label { 
            display: inline-block; margin: 15px 0 10px; font-weight: 900; 
            background: var(--pixel-blue); padding: 2px 12px; border: 2px solid var(--pixel-black);
            box-shadow: 3px 3px 0px var(--pixel-black); transform: rotate(-1deg);
        }

        .input-group { background: var(--pixel-gray); border: 3px solid var(--pixel-black); padding: 20px; margin-top: 25px; position: relative; }

        input { 
            border: 3px solid var(--pixel-black); padding: 12px; font-family: inherit; font-size: 16px; 
            outline: none; width: 100%; box-sizing: border-box; margin-bottom: 12px; 
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.1);
        }

        .method-selector { display: flex; gap: 12px; margin-bottom: 15px; }
        .method-btn { 
            flex: 1; padding: 10px; border: 3px solid var(--pixel-black); 
            cursor: pointer; background: white; font-size: 0.9em; text-align: center; 
            font-weight: bold; box-shadow: 4px 4px 0px var(--pixel-black); transition: 0.1s;
        }
        .method-btn.active { background: var(--pixel-black); color: white; transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--pixel-black); }

        button { 
            padding: 10px; border: 3px solid var(--pixel-black); font-weight: 900; 
            cursor: pointer; box-shadow: 3px 3px 0px var(--pixel-black); font-family: inherit; transition: 0.1s;
        }
        button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--pixel-black); }

        .btn-blue { background: var(--pixel-blue); flex: 1; }
        .btn-yellow { background: var(--pixel-yellow); flex: 1; }
        .btn-archive { width: 100%; background: var(--pixel-pink); margin-top: 20px; font-size: 1.1em; }

        .summary-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 3px solid var(--pixel-black); gap: 12px; }
        .item-content { flex: 1; }
        .item-info { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1em; }
        .item-img { width: 60px; height: 60px; border: 3px solid var(--pixel-black); object-fit: cover; background: #fff; flex-shrink: 0; }
        
        .pay-tag { font-size: 0.75em; padding: 2px 8px; background: var(--pixel-gray); border: 2px solid var(--pixel-black); margin-top: 6px; display: inline-block; font-weight: 900; }
        .action-btns { display: flex; gap: 5px; margin-top: 5px; }
        .btn-edit, .btn-view { background: #fff; font-size: 0.7em; padding: 2px 8px; }
        .btn-del { background: var(--pixel-red); color: white; font-size: 0.7em; padding: 2px 8px; }

        .total-panel { margin-top: 20px; padding: 20px; background: var(--pixel-yellow); border: 4px solid var(--pixel-black); box-shadow: 6px 6px 0px var(--pixel-black); }
        .stat-sub { font-size: 0.9em; display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: bold;}
        #remaining-box.warning { background: var(--pixel-red) !important; color: white !important; }

        .mission-title { font-size: 1.2em; font-weight: 900; margin-top: 15px; display: flex; justify-content: space-between; border-bottom: 4px solid var(--pixel-black); padding-bottom: 5px; }

        /* 歷史紀錄卡片樣式 */
        .history-card { 
            background: #fff; border: 3px solid var(--pixel-black); padding: 15px; margin-top: 15px; 
            box-shadow: 4px 4px 0px var(--pixel-black); position: relative;
        }

        /* 彈窗樣式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: var(--pixel-white); border: 4px solid var(--pixel-black);
            padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
            box-shadow: 10px 10px 0px var(--pixel-black);
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="pixel-box">
        <h2>[ 🚀 戰力評估室 🚀 ]</h2>
        <span class="section-label">01. 本月初始戰力</span>
        <div style="display:flex; gap:12px;">
            <input type="month" id="month-select" style="flex:1.2">
            <input type="number" id="income" placeholder="輸入戰力值(•̀ᴗ•́)و" style="flex:1">
        </div>

        <div class="input-group">
            <span class="section-label" style="margin-top:0; position:absolute; top:-18px; left:15px; background: var(--pixel-purple);color: white;">02. 偵測能量消耗</span>
            <input type="text" id="item-name" placeholder="這次消耗喏什麼寶物...">
            <input type="number" id="item-amount" placeholder="金額 (G)">
            <div class="method-selector">
                <div class="method-btn active" id="m-cash" onclick="setMethod('現金')">💵 現金</div>
                <div class="method-btn" id="m-card" onclick="setMethod('信用卡')">💳 信用卡</div>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.85em; font-weight: 900; display: block; margin-bottom: 5px;">📸 捕捉戰利品照片 (可不傳)：</label>
                <input type="file" id="item-file" accept="image/*" style="border:none; padding:0; background:none; box-shadow:none;">
            </div>
            <div class="btn-row" style="display:flex; gap:12px;">
                <button class="btn-blue" onclick="processAndTransfer('fixed')">🏠 主線生存支出</button>
                <button class="btn-yellow" onclick="processAndTransfer('extra')">🎁 支線快樂消耗</button>
            </div>
        </div>
        <button class="btn-archive" onclick="archiveMonth()">💾 任務完成，封印帳本 </button>
    </div>

    <div class="pixel-box">
        <h2>[ 📜 任務清單 ]</h2>
        <div class="mission-title" style="color: #1d4ed8; border-color: #1d4ed8;">🏠 主線任務 <span id="sub-f">$0</span></div>
        <div id="list-fixed" style="min-height: 20px; margin-bottom: 20px;"></div>
        <div class="mission-title" style="color: #b45309; border-color: #b45309;">🎁 支線任務 <span id="sub-e">$0</span></div>
        <div id="list-extra" style="min-height: 20px; margin-bottom: 20px;"></div>

        <div class="total-panel">
            <div class="stat-sub"><span>現金支付小計</span><span id="stat-cash">$0</span></div>
            <div class="stat-sub"><span>信用卡帳單小計</span><span id="stat-card">$0</span></div>
            <div style="display:flex; justify-content:space-between; font-weight:900; border-top:3px solid #000; padding-top:10px; margin-top:10px; font-size:1.1em;">
                <span>總能量消耗</span><span id="total-expense">$0</span>
            </div>
            <div id="remaining-box" style="display:flex; justify-content:space-between; font-size:1.5em; font-weight:900; margin-top:10px; padding: 5px 10px;">
                <span>剩餘戰力：</span><span id="remaining">$0</span>
            </div>
        </div>
        <h3 style="border-bottom: 4px solid var(--pixel-black); margin-top: 30px; font-weight: 900;">📜 歷史通關紀錄</h3>
        <div id="history-log"></div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <h2 id="modal-title" style="margin-top:-24px;">[ 歷史明細 ]</h2>
        <div id="modal-body"></div>
        <button style="width:100%; margin-top:20px; background:var(--pixel-gray);" onclick="closeModal()">關閉視窗</button>
    </div>
</div>

<canvas id="compressCanvas" style="display:none;"></canvas>

<script>
    let currentExpenses = { fixed: [], extra: [] };
    let currentMethod = '現金';
    let historyData = JSON.parse(localStorage.getItem('pixelBudgetHistory')) || [];

    function setMethod(m) {
        currentMethod = m;
        document.getElementById('m-cash').className = m === '現金' ? 'method-btn active' : 'method-btn';
        document.getElementById('m-card').className = m === '信用卡' ? 'method-btn active' : 'method-btn';
    }

    function processAndTransfer(type) {
        const nI = document.getElementById('item-name');
        const aI = document.getElementById('item-amount');
        const fI = document.getElementById('item-file');
        const name = nI.value.trim() || "未知能量消耗";
        const amount = parseFloat(aI.value) || 0;
        if (amount <= 0) return;

        if (fI.files[0]) {
            compressImage(fI.files[0], (base64Img) => {
                pushItem(type, name, amount, base64Img);
                resetInputs(nI, aI, fI);
            });
        } else {
            pushItem(type, name, amount, null);
            resetInputs(nI, aI, fI);
        }
    }

    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.getElementById('compressCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 150; canvas.height = 150;
                ctx.drawImage(img, 0, 0, 150, 150);
                callback(canvas.toDataURL('image/jpeg', 0.7));
            };
        };
    }

    function pushItem(type, name, amount, img) {
        currentExpenses[type].push({ name, amount, img, method: currentMethod });
        renderCurrent();
    }

    function resetInputs(n, a, f) { n.value = ""; a.value = ""; f.value = ""; }

    function renderCurrent() {
        const fL = document.getElementById('list-fixed');
        const eL = document.getElementById('list-extra');
        fL.innerHTML = ""; eL.innerHTML = "";
        let subF = 0, subE = 0, cashT = 0, cardT = 0;
        
        const getItemHTML = (item, type, index, isHistory=false) => {
            const imgHTML = item.img ? `<img src="${item.img}" class="item-img">` : '';
            const actionBtns = isHistory ? '' : `
                <div class="action-btns">
                    <button class="btn-edit" onclick="editItem('${type}', ${index})">修正</button>
                    <button class="btn-del" onclick="deleteItem('${type}', ${index})">刪除</button>
                </div>`;
            
            return `
                <div class="summary-item">
                    ${imgHTML}
                    <div class="item-content">
                        <div class="item-info"><span>${item.name}</span><span>$${item.amount.toLocaleString()}</span></div>
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span class="pay-tag">${item.method === '現金' ? '💵 現金' : '💳 信用卡'}</span>
                            ${actionBtns}
                        </div>
                    </div>
                </div>`;
        };

        currentExpenses.fixed.forEach((i, idx) => {
            subF += i.amount;
            if(i.method === '現金') cashT += i.amount; else cardT += i.amount;
            fL.innerHTML += getItemHTML(i, 'fixed', idx);
        });
        currentExpenses.extra.forEach((i, idx) => {
            subE += i.amount;
            if(i.method === '現金') cashT += i.amount; else cardT += i.amount;
            eL.innerHTML += getItemHTML(i, 'extra', idx);
        });
        
        document.getElementById('sub-f').innerText = `$${subF.toLocaleString()}`;
        document.getElementById('sub-e').innerText = `$${subE.toLocaleString()}`;
        document.getElementById('stat-cash').innerText = `$${cashT.toLocaleString()}`;
        document.getElementById('stat-card').innerText = `$${cardT.toLocaleString()}`;
        
        const income = parseFloat(document.getElementById('income').value) || 0;
        const total = subF + subE;
        const remain = income - total;
        document.getElementById('total-expense').innerText = `$${total.toLocaleString()}`;
        document.getElementById('remaining').innerText = `$${remain.toLocaleString()}${remain < 0 ? ' (💀破產!)' : ''}`;
        document.getElementById('remaining-box').className = remain < 0 ? 'total-panel warning' : 'total-panel';
    }

    function archiveMonth() {
        const month = document.getElementById('month-select').value;
        const income = parseFloat(document.getElementById('income').value) || 0;
        if (currentExpenses.fixed.length === 0 && currentExpenses.extra.length === 0) return alert("沒有數據可以封印！");
        
        // 封印時儲存詳細內容
        historyData.unshift({ 
            month, 
            income,
            total: currentExpenses.fixed.concat(currentExpenses.extra).reduce((s,i)=>s+i.amount, 0),
            details: JSON.parse(JSON.stringify(currentExpenses)) 
        });
        
        localStorage.setItem('pixelBudgetHistory', JSON.stringify(historyData));
        currentExpenses = { fixed: [], extra: [] };
        renderCurrent();
        renderHistory();
        alert("本月戰報已封印！");
    }

    function renderHistory() {
        document.getElementById('history-log').innerHTML = historyData.map((r, idx) => `
            <div class="history-card">
                <b>📅 ${r.month} 戰報</b><br>
                戰力: $${r.income.toLocaleString()} | 消耗: $${r.total.toLocaleString()}<br>
                結算: <span style="color:${(r.income-r.total) < 0 ? 'red' : 'green'}; font-weight:bold">$${(r.income-r.total).toLocaleString()}</span>
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="btn-view" onclick="viewDetails(${idx})">🔍 查看詳情</button>
                    <button class="btn-del" onclick="deleteHistory(${idx})">🗑️ 刪除</button>
                </div>
            </div>
        `).join('');
    }

    function viewDetails(idx) {
        const data = historyData[idx];
        const modalBody = document.getElementById('modal-body');
        document.getElementById('modal-title').innerText = `[ ${data.month} 明細 ]`;
        
        let html = `<div class="section-label">🏠 主線任務</div>`;
        data.details.fixed.forEach(i => html += getSimpleItemHTML(i));
        html += `<div class="section-label" style="background:var(--pixel-yellow)">🎁 支線任務</div>`;
        data.details.extra.forEach(i => html += getSimpleItemHTML(i));
        
        modalBody.innerHTML = html;
        document.getElementById('modal').style.display = 'flex';
    }

    function getSimpleItemHTML(item) {
        const img = item.img ? `<img src="${item.img}" style="width:40px; height:40px; border:2px solid #000; margin-right:10px;">` : '';
        return `<div style="display:flex; align-items:center; border-bottom:1px solid #ddd; padding:8px 0;">
            ${img} <div><b>${item.name}</b><br><small>${item.method} | $${item.amount.toLocaleString()}</small></div>
        </div>`;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function deleteHistory(idx) { if(confirm("確定要刪除這筆封印紀錄嗎？")) { historyData.splice(idx,1); localStorage.setItem('pixelBudgetHistory', JSON.stringify(historyData)); renderHistory(); } }
    function deleteItem(type, index) { currentExpenses[type].splice(index, 1); renderCurrent(); }
    function editItem(type, index) {
        const item = currentExpenses[type][index];
        document.getElementById('item-name').value = item.name;
        document.getElementById('item-amount').value = item.amount;
        setMethod(item.method);
        deleteItem(type, index);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = () => {
        const now = new Date();
        document.getElementById('month-select').value = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, '0');
        renderHistory();
        document.getElementById('income').addEventListener('input', renderCurrent);
    };
</script>
</body>
</html>
